# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      paper_toolkit_mcp_UNPAYWALL_EMAIL:
        type: string
        description: "Email for Unpaywall API (required for Unpaywall source)"
      paper_toolkit_mcp_CORE_API_KEY:
        type: string
        description: "Free API key for CORE (recommended)"
      paper_toolkit_mcp_SEMANTIC_SCHOLAR_API_KEY:
        type: string
        description: "API key for Semantic Scholar (optional, improves rate limits)"
      paper_toolkit_mcp_ZENODO_ACCESS_TOKEN:
        type: string
        description: "Access token for Zenodo (optional)"
      paper_toolkit_mcp_GOOGLE_SCHOLAR_PROXY_URL:
        type: string
        description: "HTTP/HTTPS proxy URL for Google Scholar (optional)"
      paper_toolkit_mcp_IEEE_API_KEY:
        type: string
        description: "API key to enable IEEE Xplore (optional)"
      paper_toolkit_mcp_ACM_API_KEY:
        type: string
        description: "API key to enable ACM Digital Library (optional)"
  commandFunction:
    |-
    (config) => {
      const env = {};
      if (config.paper_toolkit_mcp_UNPAYWALL_EMAIL) env.paper_toolkit_mcp_UNPAYWALL_EMAIL = config.paper_toolkit_mcp_UNPAYWALL_EMAIL;
      if (config.paper_toolkit_mcp_CORE_API_KEY) env.paper_toolkit_mcp_CORE_API_KEY = config.paper_toolkit_mcp_CORE_API_KEY;
      if (config.paper_toolkit_mcp_SEMANTIC_SCHOLAR_API_KEY) env.paper_toolkit_mcp_SEMANTIC_SCHOLAR_API_KEY = config.paper_toolkit_mcp_SEMANTIC_SCHOLAR_API_KEY;
      if (config.paper_toolkit_mcp_ZENODO_ACCESS_TOKEN) env.paper_toolkit_mcp_ZENODO_ACCESS_TOKEN = config.paper_toolkit_mcp_ZENODO_ACCESS_TOKEN;
      if (config.paper_toolkit_mcp_GOOGLE_SCHOLAR_PROXY_URL) env.paper_toolkit_mcp_GOOGLE_SCHOLAR_PROXY_URL = config.paper_toolkit_mcp_GOOGLE_SCHOLAR_PROXY_URL;
      if (config.paper_toolkit_mcp_IEEE_API_KEY) env.paper_toolkit_mcp_IEEE_API_KEY = config.paper_toolkit_mcp_IEEE_API_KEY;
      if (config.paper_toolkit_mcp_ACM_API_KEY) env.paper_toolkit_mcp_ACM_API_KEY = config.paper_toolkit_mcp_ACM_API_KEY;
      return { command: 'paper-toolkit-mcp', env };
    }
  exampleConfig:
    paper_toolkit_mcp_UNPAYWALL_EMAIL: "your@email.com"
